<!-- https://getbootstrap.com/docs/5.0/components/accordion/ -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion Teste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div id="menu-suspenso" class="accordion">
        <div id="exemplo-1" class="accordion-item">
            <button class="btn btn-primary accordion-button" data-bs-toggle="collapse" data-bs-target="#item1">
                Título 1
            </button>
            <div id="item1" class="accordion-collapse collapse show" data-bs-parent="#menu-suspenso">
                Conteúdo 1
            </div>
        </div>

        <div id="exemplo-2" class="accordion-item">
            <button class="btn btn-danger accordion-button" data-bs-toggle="collapse" data-bs-target="#item2">
                Título 2
            </button>
            <div id="item2" class="accordion-collapse collapse" data-bs-parent="#menu-suspenso">
                Conteúdo 2
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
