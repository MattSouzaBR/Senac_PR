<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativiade Bootstrap</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .conteiner4 { @extend .container; max-width: 1140px; margin: 0 auto; padding: 1.5rem 0; }
        
        .linha4 { display: flex; flex-wrap: wrap; margin-bottom: 1.5rem; gap: 1rem; }

        .cabecalho5 { 
            background-color: var(--bs-primary); 
            color: white; 
            text-align: center; 
            padding: 3rem; 
            border-radius: 0.5rem;
            width: 100%;
        }

        .coluna6 { flex: 1 0 0%; min-width: 300px; }

        .bloco4 { 
            background-color: var(--bs-light); 
            border: 1px solid var(--bs-border-color); 
            padding: 1.5rem; 
            height: 100%; 
            border-radius: 0.5rem; 
        }

        .rodape4 { 
            background-color: var(--bs-dark); 
            color: white; 
            text-align: center; 
            padding: 1.5rem; 
            border-radius: 0.5rem;
            width: 100%;
        }

        .texto-azul { color: var(--bs-primary); }
        .alerta-verde { 
            background-color: #d1e7dd; 
            color: #0f5132; 
            padding: 1rem; 
            border-radius: 0.375rem; 
            border: 1px solid #badbcc;
        }
    </style>
</head>
<body>

    <div class="conteiner4">

        <div class="linha4">
            <div class="cabecalho5">
                <h1 class="display-5 fw-bold">Cabeçalho</h1>
                <p class="fs-5">Estilizado via Bootstrap com classe personalizada</p>
            </div>
        </div>

        <div class="linha4">
            
            <div class="coluna6">
                <div class="bloco4">
                    <h3 class="texto-azul">Coluna 1</h3>
                    <p>No desktop fica ao lado. No celular empilha (se tudo der certo)
                    <ul>
                        <li>Com Bootstrap</li>
                        <li>Nomes curtos</li>
                        <li>Fácil de ler</li>
                    </ul>
                </div>
            </div>

            <div class="coluna6">
                <div class="bloco4">
                    <h3 class="texto-azul">Coluna 2</h3>
                    <p>Conteúdo da segunda coluna.</p>
                    <div class="alerta-verde">
                        <strong>Sucesso!</strong> Bootstrap ativo e código limpo.
                    </div>
                </div>
            </div>

        </div>

        <div class="linha4">
            <div class="rodape4">
                <p class="m-0">2026 - Rodapé do site</p>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
