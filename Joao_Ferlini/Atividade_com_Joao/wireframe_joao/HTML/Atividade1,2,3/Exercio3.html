<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material de Estudo Digital - Estruturas de Controle</title>

    <style>
        body {
            background-color: #000000;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header, footer {
            background-color: ##ffb5fa;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav {
            background-color: #ffb5fa;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .header {
            background-color: #ff2bb8;
        }

        .linha{
            display: flex;
        }
        .coluna {
            width: 33%; 
            padding: 20px;
        }
        .cor{
            background-color: #ea95f0;
        }

        #footer {
            background-color: #ff2bb8;
            color: white;
        }
        .box {
            background-color: #d40098;
            text-align: center;
            width: 80px;
            height: 30px;
            border-radius: 36px;
            border: 4px solid #2c3e50;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.25);
        }
    </style>

</head>

<body>

<div class="header">
<header>
    <h1 style="text-align: left;">Lojinha virtual do Kim-João-Um</h1>

</header>
</div>


<div class="linha">
        <div class="coluna cor">   
            <h1 style="text-align: center;"> AK-47 </h1>
            <img style="width: 70%;" src="https://infoarmas.com.br/wp-content/uploads/2020/03/AK-47-2-585x585.jpg">
            <h2>R$ 7299,00 </h2>
        <div class="box">Comprar</div>   
        </div>

        <div class="coluna cor">   
            <h1 style="text-align: center;"> Pelucia da Hello Kitty </h1>
            <img style="width: 60%;" src="https://http2.mlstatic.com/D_NQ_NP_618671-MLB89174841632_082025-O.webp">
            <h2>R$169,00 </h2>
        <div class="box">Comprar</div>
        </div>

        <div class="coluna cor">   
            <h1 style="text-align: center;"> Ogiva Nuclear B61-13 </h1>
            <img style="width: 100%;" src="https://ichef.bbci.co.uk/ace/ws/640/cpsprodpb/14560/production/_101069238_gettyimages-486157792.jpg.webp">
            <h2>R$7,659,999,99</h2>
        <div class="box">Comprar</div>    
        </div>
    </div>

<div id="footer">
<footer>
    <h5>Rodapé</h5>
    <h6>Loja fictícia criada para atividade de HTML</h6>
</footer>
</div>

</body>
</html>
