<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/standard/variables.css">
    <link rel="stylesheet" href="css/standard/css_favorites.css">
    <link rel="stylesheet" href="css/standard/reset.css">
    <link rel="stylesheet" href="css/standard/autofit.css">
    <link rel="stylesheet" href="css/standard/normalize.css">
    <link rel="stylesheet" href="css/index-style.css">
</head>
<body class="layout">
    <main>
        <div class="topo">
            <h1>Cadastro de Cliente</h1>
            <p>Exemplo de formulário para cadastro de cliente</p>
        </div>

        <section>
            <form action="">
                <label for="">Nome</label>
                <input type="text" name="nome" id="nome" placeholder="Digite o nome">

                <label for="">E-mail</label>
                <input type="email" name="email" id="email" placeholder="Informe o e-mail">

                <label for="">Telefone</label>
                <input type="text" name="telefone" id="telefone" placeholder="Digite um telefone">
                
                <label for="">Cidade</label>
                <input type="text" name="cidade" id="cidade" placeholder="Informe a cidade">

                <label for="">Tipo</label>
                <select name="tipo" id="tipo">
                    <option value="">Selecione!</option>
                    <option value="">Comum</option>
                    <option value="">Premium</option>
                </select>

                <label for="">Observações</label>
                <textarea name="obs" id="obs" placeholder="Digite uma observação"></textarea>

                <button type="submit">
                    Salvar
                </button>

            </form>
        </section>
    </main>
    <menu>
        <h2>Menu do Sistema</h2>
        <a href="index.html">Início</a>
        <a href="cadastro.html">Cadastro</a>
        <a href="relatorio.html">Relatório</a>
    </menu>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
