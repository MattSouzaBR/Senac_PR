    <title>Contato</title>

<body class="min-vh-100 grid row-1fr-auto col-auto-1fr-auto">
    <header class="bg-primary">
        <div class="container d-flex align-items-center justify-content-between">
            <h3 class="mt-2"><strong class="text-white ">Meu Site</strong></h3>
            <nav>
                <ul class="d-flex gap-2 mt-3">
                    <li><a class="text-white" href="index.html">Início</a></li>
                    <li><a class="text-white" href="sobre.html">Sobre</a></li>
                    <li><a class="text-white" href="servicos.html">Serviços</a></li>
                    <li><a class="text-white" href="equipe.html">Equipe</a></li>
                    <li><a class="text-white" href="contato.html">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container">
        <div class="row mt-3 p-4">
            <form class="p-4 bg-white rounded-2 shadow-sm" action="">
                <h2><strong>Contato</strong></h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                <div class="row">
                    <div class="col-12 col-md">
                        <label class="form-label" for="">Nome</label>
                        <input class="form-control" type="text" placeholder="Digite seu nome">
                    </div>
                    <div class="col-12 col-md">
                        <label class="form-label" for="">E-mail</label>
                        <input class="form-control" type="text" placeholder="Digite seu e-mail">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12 col-md">
                        <label class="form-label" for="">Assunto</label>
                        <input class="form-control" type="text" placeholder="Digite o assunto">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12 col-md">
                        <label class="form-label" for="">Mensagem</label>
                        <textarea style="min-height: 100px;" class="form-control" name="" id="" placeholder="Digite sua mensagem"></textarea>
                    </div>
                </div>
                <button class="btn btn-primary mt-3">Enviar</button>
                <button class="btn btn-secondary mt-3">Limpar</button>
            </form>
        </div>
    </main>
    <footer class="bg-dark">
        <div class="container py-4 d-flex justify-content-between">
            <span class="text-white">© 2026 Meu Site. Todos os direitos reservados</span>
            <span class="text-white">Página Contato</span>
