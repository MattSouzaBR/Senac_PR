<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/variables.css"> <!-- Variáveis do CSS3, que facilitam manutenções globais da estilização. -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">

	<link rel="icon" href="/img/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Esses são os links de pre conexão com o site alvo. Ele informa que a conexão deve ser estabelecida e pode ser usada a qualquer momento. 
     -->

	<link rel="manifest" href="/pwa.webmanifest" />
<!-- Este webmanifest é o que permite que o site se torne um PWA, ou seja, permite que o site seja instalado nos computadores ou celulares como se fosse um aplicativo. Nele é informado a página inicial escolhida, a paleta de cor e o ícone do aplicativo. Se o arquivo não estiver PERFEITO, o PWA não funciona. 
     -->
    
    <link rel="canonical" href="">
<!-- É importante adicionar este link 'canonical', para informar que essa página que está sendo acessada tem seu endereço padrão aquele informado no href. Por exemplo, 'www.site.com' ou 'site.com', sem o canonical, para o Google são duas páginas diferentes e isso causa uma visão de conteúdo duplicado. Sites com conteúdo duplicado sofrem penalizações dos buscadores. O canonical presente informa: 'esse conteúdo é originalmente acessado pelo href informado.'
    -->

    <meta property="og:description" content=""> 
    <meta property="og:image" content=""> <!-- Imagem de apresentação desta página -->
    <meta property="og:url" content=""> <!-- URL canonico desta página -->
    <meta property="og:type" content=""> <!-- website, article, product -->
<!-- Estes são as metas informações para as redes sociais e apps de mensagens. Quando preenchidos corretamente, são eles que permitem que quando a pessoa cole o link na conversa ou faça um post, uma imagem, uma descrição e um título sejam aplicados corretamente.
    -->
    
    <meta name="title" content="">
    <meta name="description" content="">
    <meta name="keywords" content=""> <!-- Palavras separadas por ','. Palavras chaves -->
    <meta name="robots" content="index, follow"> <!-- index, noindex (Isso informa ao Google, por exemplo, se a página deve ser indexada nos resultados de pesquisa ou não. ) -->
    <meta name="author" content="Matheus R P Souza">
<!-- Essas são as metas descrições para os buscadores, como Google, Bing e Yahoo. Informar isso, ajuda os crawlers a encontrarem e indexarem a página corretamente. Melhorando o SEO. 
     -->

    <title>Atividade 4</title>
</head>
<body>
    <p>Texto</p>
    <p>Texto</p>
    <p>Texto</p>
    <p>Texto</p>
    
    <a href="#" class="button texto-claro">Botão</a>
</body>
</html>
