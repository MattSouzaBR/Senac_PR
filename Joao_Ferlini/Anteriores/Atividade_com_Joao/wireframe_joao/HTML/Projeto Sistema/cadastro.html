<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" type="text/css" href="css/estilo.css">
</head>
<body>

	<div class="layout">
		<menu>
			<h2>Menu Sistema</h2>
			<a href="index.html">Início</a>
			<a href="cadastro.html">Cadastro</a>
			<a href="relatorio.html">Relatório</a>
		</menu>

		<main>
			<div class="topo">
				<h1>Cadastro de Cliente</h1>
				<p>Exemplo de formulário para cadastro de cliente</p>
			</div>

			<section>
				<form>
					<label>Nome</label>
					<input type="text" name="nome" placeholder="Digite o nome">

					<label>E-mail</label>
					<input type="email" name="email" placeholder="Informe o e-mail">

					<label>Telefone</label>
					<input type="text" name="telefone" placeholder="Digite um telefone">

					<label>Cidade</label>
					<input type="text" name="cidade" placeholder="Infome a Cidade">

					<label>Tipo</label>
					<select name="tipo">
						<option>Selecione!</option>
						<option>Comum</option>
						<option>Premium</option>
					</select>

					<label>Observações</label>
					<textarea name="obs" placeholder="Digite alguma observação"></textarea>

					<button type="submit">Salvar</button>


				</form>
			</section>
		</main>


	</div>


</body>
</html>
