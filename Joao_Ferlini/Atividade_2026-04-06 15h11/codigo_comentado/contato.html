<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site - Contato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<!--
  Classes Bootstrap desta linha:
  - bg-light: aplica um fundo claro à página ou ao elemento.
-->
<body class="bg-light">

  <!--
    Classes Bootstrap desta linha:
    - bg-primary: aplica a cor primária do Bootstrap como fundo.
    - text-white: define a cor do texto como branca.
    - py-3: adiciona espaçamento vertical (padding no topo e embaixo) de nível 3.
  -->
  <header class="bg-primary text-white py-3">
    <!--
      Classes Bootstrap desta linha:
      - container: cria uma área centralizada com largura responsiva.
    -->
    <div class="container">
      <!--
        Classes Bootstrap desta linha:
        - row: cria uma linha do sistema de grid do Bootstrap.
        - align-items-center: alinha verticalmente os itens da linha ao centro.
      -->
      <div class="row align-items-center">
        <!--
          Classes Bootstrap desta linha:
          - col-md-6: em telas médias ou maiores, a coluna ocupa 6 das 12 partes da grade.
        -->
        <div class="col-md-6">
          <!--
            Classes Bootstrap desta linha:
            - h3: aplica o tamanho visual equivalente ao título h3, sem alterar a semântica do elemento.
            - m-0: remove as margens do elemento.
          -->
          <h1 class="h3 m-0">Meu Site</h1>
        </div>
        <!--
          Classes Bootstrap desta linha:
          - col-md-6: em telas médias ou maiores, a coluna ocupa 6 das 12 partes da grade.
        -->
        <div class="col-md-6">
          <!--
            Classes Bootstrap desta linha:
            - d-flex: transforma o elemento em um contêiner flexível.
            - justify-content-md-end: em telas médias ou maiores, alinha os itens ao final do eixo horizontal.
            - justify-content-start: alinha os itens ao início do eixo horizontal.
            - mt-3: adiciona margem superior de nível 3.
            - mt-md-0: remove a margem superior em telas médias ou maiores.
          -->
          <nav class="d-flex justify-content-md-end justify-content-start mt-3 mt-md-0">
            <!--
              Classes Bootstrap desta linha:
              - nav: aplica o estilo base de navegação do Bootstrap à lista.
            -->
            <ul class="nav">
              <!--
                Classes Bootstrap desta linha:
                - nav-item: identifica cada item individual de uma navegação.
                - nav-link: aplica estilo visual e espaçamento de link de navegação.
                - text-white: define a cor do texto como branca.
              -->
              <li class="nav-item"><a class="nav-link text-white" href="index.html">Início</a></li>
              <!--
                Classes Bootstrap desta linha:
                - nav-item: identifica cada item individual de uma navegação.
                - nav-link: aplica estilo visual e espaçamento de link de navegação.
                - text-white: define a cor do texto como branca.
              -->
              <li class="nav-item"><a class="nav-link text-white" href="sobre.html">Sobre</a></li>
              <!--
                Classes Bootstrap desta linha:
                - nav-item: identifica cada item individual de uma navegação.
                - nav-link: aplica estilo visual e espaçamento de link de navegação.
                - text-white: define a cor do texto como branca.
              -->
              <li class="nav-item"><a class="nav-link text-white" href="servicos.html">Serviços</a></li>
              <!--
                Classes Bootstrap desta linha:
                - nav-item: identifica cada item individual de uma navegação.
                - nav-link: aplica estilo visual e espaçamento de link de navegação.
                - text-white: define a cor do texto como branca.
              -->
              <li class="nav-item"><a class="nav-link text-white" href="equipe.html">Equipe</a></li>
              <!--
                Classes Bootstrap desta linha:
                - nav-item: identifica cada item individual de uma navegação.
                - nav-link: aplica estilo visual e espaçamento de link de navegação.
                - text-white: define a cor do texto como branca.
              -->
              <li class="nav-item"><a class="nav-link text-white" href="contato.html">Contato</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <!--
    Classes Bootstrap desta linha:
    - py-5: adiciona espaçamento vertical (padding no topo e embaixo) de nível 5.
  -->
  <main class="py-5">
    <!--
      Classes Bootstrap desta linha:
      - container: cria uma área centralizada com largura responsiva.
    -->
    <div class="container">
      <!--
        Classes Bootstrap desta linha:
        - row: cria uma linha do sistema de grid do Bootstrap.
        - justify-content-center: centraliza os itens horizontalmente.
      -->
      <div class="row justify-content-center">
        <!--
          Classes Bootstrap desta linha:
          - col-md-8: em telas médias ou maiores, a coluna ocupa 8 das 12 partes da grade.
        -->
        <div class="col-md-8">
          <!--
            Classes Bootstrap desta linha:
            - bg-white: aplica fundo branco ao elemento.
            - p-4: adiciona espaçamento interno (padding) em todos os lados de nível 4.
            - rounded: arredonda os cantos do elemento.
            - shadow-sm: aplica uma sombra pequena ao redor do elemento.
          -->
          <div class="bg-white p-4 rounded shadow-sm">
            <h2>Contato</h2>
            <p>
              Preencha o formulário abaixo. Os dados são fictícios e servem apenas para treinamento com Bootstrap.
            </p>

            <form>
              <!--
                Classes Bootstrap desta linha:
                - row: cria uma linha do sistema de grid do Bootstrap.
              -->
              <div class="row">
                <!--
                  Classes Bootstrap desta linha:
                  - col-md-6: em telas médias ou maiores, a coluna ocupa 6 das 12 partes da grade.
                  - mb-3: adiciona margem inferior de nível 3.
                -->
                <div class="col-md-6 mb-3">
                  <!--
                    Classes Bootstrap desta linha:
                    - form-label: aplica o estilo padrão de rótulo de formulário.
                  -->
                  <label class="form-label">Nome</label>
                  <!--
                    Classes Bootstrap desta linha:
                    - form-control: aplica o estilo padrão aos campos de formulário.
                  -->
                  <input type="text" class="form-control" placeholder="Digite seu nome">
                </div>
                <!--
                  Classes Bootstrap desta linha:
                  - col-md-6: em telas médias ou maiores, a coluna ocupa 6 das 12 partes da grade.
                  - mb-3: adiciona margem inferior de nível 3.
                -->
                <div class="col-md-6 mb-3">
                  <!--
                    Classes Bootstrap desta linha:
                    - form-label: aplica o estilo padrão de rótulo de formulário.
                  -->
                  <label class="form-label">E-mail</label>
                  <!--
                    Classes Bootstrap desta linha:
                    - form-control: aplica o estilo padrão aos campos de formulário.
                  -->
                  <input type="email" class="form-control" placeholder="Digite seu e-mail">
                </div>
              </div>

              <!--
                Classes Bootstrap desta linha:
                - row: cria uma linha do sistema de grid do Bootstrap.
              -->
              <div class="row">
                <!--
                  Classes Bootstrap desta linha:
                  - col-12: faz a coluna ocupar 12 partes da grade, ou seja, largura total.
                  - mb-3: adiciona margem inferior de nível 3.
                -->
                <div class="col-12 mb-3">
                  <!--
                    Classes Bootstrap desta linha:
                    - form-label: aplica o estilo padrão de rótulo de formulário.
                  -->
                  <label class="form-label">Assunto</label>
                  <!--
                    Classes Bootstrap desta linha:
                    - form-control: aplica o estilo padrão aos campos de formulário.
                  -->
                  <input type="text" class="form-control" placeholder="Digite o assunto">
                </div>
              </div>

              <!--
                Classes Bootstrap desta linha:
                - row: cria uma linha do sistema de grid do Bootstrap.
              -->
              <div class="row">
                <!--
                  Classes Bootstrap desta linha:
                  - col-12: faz a coluna ocupar 12 partes da grade, ou seja, largura total.
                  - mb-3: adiciona margem inferior de nível 3.
                -->
                <div class="col-12 mb-3">
                  <!--
                    Classes Bootstrap desta linha:
                    - form-label: aplica o estilo padrão de rótulo de formulário.
                  -->
                  <label class="form-label">Mensagem</label>
                  <!--
                    Classes Bootstrap desta linha:
                    - form-control: aplica o estilo padrão aos campos de formulário.
                  -->
                  <textarea class="form-control" rows="5" placeholder="Digite sua mensagem"></textarea>
                </div>
              </div>

              <!--
                Classes Bootstrap desta linha:
                - row: cria uma linha do sistema de grid do Bootstrap.
              -->
              <div class="row">
                <!--
                  Classes Bootstrap desta linha:
                  - col-12: faz a coluna ocupar 12 partes da grade, ou seja, largura total.
                -->
                <div class="col-12">
                  <!--
                    Classes Bootstrap desta linha:
                    - btn: transforma o elemento em um botão com estilo Bootstrap.
                    - btn-primary: aplica o estilo do botão principal.
                  -->
                  <button type="submit" class="btn btn-primary">Enviar</button>
                  <!--
                    Classes Bootstrap desta linha:
                    - btn: transforma o elemento em um botão com estilo Bootstrap.
                    - btn-secondary: aplica o estilo do botão secundário.
                  -->
                  <button type="reset" class="btn btn-secondary">Limpar</button>
                </div>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </main>

  <!--
    Classes Bootstrap desta linha:
    - bg-dark: aplica fundo escuro ao elemento.
    - text-white: define a cor do texto como branca.
    - py-4: adiciona espaçamento vertical (padding no topo e embaixo) de nível 4.
    - mt-5: adiciona margem superior de nível 5.
  -->
  <footer class="bg-dark text-white py-4 mt-5">
    <!--
      Classes Bootstrap desta linha:
      - container: cria uma área centralizada com largura responsiva.
    -->
    <div class="container">
      <!--
        Classes Bootstrap desta linha:
        - row: cria uma linha do sistema de grid do Bootstrap.
      -->
      <div class="row">
        <!--
          Classes Bootstrap desta linha:
          - col-md-6: em telas médias ou maiores, a coluna ocupa 6 das 12 partes da grade.
        -->
        <div class="col-md-6">
          <!--
            Classes Bootstrap desta linha:
            - mb-0: remove a margem inferior do elemento.
          -->
          <p class="mb-0">© 2026 Meu Site. Todos os direitos reservados.</p>
        </div>
        <!--
          Classes Bootstrap desta linha:
          - col-md-6: em telas médias ou maiores, a coluna ocupa 6 das 12 partes da grade.
          - text-md-end: alinha o texto à direita em telas médias ou maiores.
        -->
        <div class="col-md-6 text-md-end">
          <!--
            Classes Bootstrap desta linha:
            - mb-0: remove a margem inferior do elemento.
          -->
          <p class="mb-0">Página Contato.</p>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
