<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/standard/variables.css">
    <link rel="stylesheet" href="css/standard/css_favorites.css">
    <link rel="stylesheet" href="css/standard/reset.css">
    <link rel="stylesheet" href="css/standard/autofit.css">
    <link rel="stylesheet" href="css/standard/normalize.css">
    <link rel="stylesheet" href="css/index-style.css">
</head>
<body>
    <!-- Bootstrap -->
    <div class="row"  style="background-color: green;">
        <div class="col-2" style="background-color: red;">Teste</div>
        <div class="col" style="background-color: blue;">Teste</div>
    </div>

    <!-- 3 colunas iguais — auto-fit divide automaticamente -->
    <div class="nrow">
        <div class="ncol">1/3</div>
        <div class="ncol">1/3</div>
        <div class="ncol-1-10">1/10</div>
    </div>

    <!-- Responsivo: desktop 1/3, tablet 1/2, mobile 100% -->
    <div class="nrow">
        <div class="ncol ncol-1-3 m-ncol-1-2 pp-ncol-1-1">Teste 1</div>
        <div class="ncol ncol-1-3 m-ncol-1-2 pp-ncol-1-1">Teste 2</div>
        <div class="ncol ncol-1-3 m-ncol-1-2 pp-ncol-1-1">Teste 3</div>
    </div>

    <!-- Aninhamento — co vira pai de outro li -->
    <div class="nrow">
        <div class="ncol ncol-1-3">
            sidebar
        </div>
        <div class="ncol ncol-2-3">
            <div class="nrow">
                <div class="ncol ncol-1-2">conteúdo A</div>
                <div class="ncol ncol-1-2">conteúdo B</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
