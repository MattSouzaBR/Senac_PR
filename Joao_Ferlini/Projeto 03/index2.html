<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Projeto 03 (2)</title>
    <style>
        .linha {
            display: flex;
        }
        .coluna {
            width: 33%;
            text-align: center;
            padding: 20px;
            background-color: yellow;
        }
        .amarelo {
            background-color: yellow;
        }
        .verde {
            background-color: green;
            color: #fff;
        }
        .azul {
            background-color: blue;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="linha"> <!-- DIV Linha -->
        <div class="coluna amarelo">
            Coluna 1
        </div>

        <div class="coluna azul">
            Coluna 2
        </div>

        <div class="coluna verde">
            Coluna 3
        </div>
    </div>
</body>
</html>
